name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - uses: jtalk/url-health-check-action@v5
        with:
          url: https://fullstack-cicd-2026.onrender.com/health
          max-attempts: 3
          retry-delay: 20s